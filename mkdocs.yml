# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'Forensic Science'
site_description: 'An interactive intelligent textbook on forensic science techniques, evidence analysis, and crime scene investigation'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/forensic-science/'

# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` injects og:title, og:description, og:image,
# og:type, og:url, and twitter:* meta tags on every page using each page's
# frontmatter `title:` / `description:` / `image:` (falling back to the site-
# wide values and `img/cover.png`). This is the Cairo-free path to social-
# media previews — works without `pip install "mkdocs-material[imaging]"`.
# If the `social` plugin below is ever enabled, the same hook also rewrites
# its auto-generated `/assets/images/social/...` URLs to point at the
# declared cover image. Verify the result with `bk-check-social-cover`.
hooks:
  - plugins/social_override.py

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/forensic-science'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

