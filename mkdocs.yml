          - Quiz: chapters/01-intro-forensic-science/quiz.md
      - 2. Crime Scene Investigation:
          - Chapter: chapters/02-crime-scene-investigation/index.md
          - Quiz: chapters/02-crime-scene-investigation/quiz.md
      - 3. Fingerprint Analysis:
          - Chapter: chapters/03-fingerprint-analysis/index.md
          - Quiz: chapters/03-fingerprint-analysis/quiz.md
      - 4. Hair and Fiber Analysis:
          - Chapter: chapters/04-hair-and-fiber-analysis/index.md
          - Quiz: chapters/04-hair-and-fiber-analysis/quiz.md
      - 5. Glass, Soil & Trace Evidence:
          - Chapter: chapters/05-glass-soil-trace-evidence/index.md
          - Quiz: chapters/05-glass-soil-trace-evidence/quiz.md
      - 6. Forensic Serology:
          - Chapter: chapters/06-forensic-serology/index.md
          - Quiz: chapters/06-forensic-serology/quiz.md
      - 7. Bloodstain Pattern Analysis:
          - Chapter: chapters/07-bloodstain-pattern-analysis/index.md
          - Quiz: chapters/07-bloodstain-pattern-analysis/quiz.md
      - 8. DNA Profiling:
          - Chapter: chapters/08-forensic-dna-profiling/index.md
          - Quiz: chapters/08-forensic-dna-profiling/quiz.md
      - 9. Forensic Toxicology:
          - Chapter: chapters/09-forensic-toxicology/index.md
          - Quiz: chapters/09-forensic-toxicology/quiz.md
      - 10. Fire, Arson & Explosives:
          - Chapter: chapters/10-fire-arson-explosives/index.md
          - Quiz: chapters/10-fire-arson-explosives/quiz.md
      - 11. Forensic Anthropology:
          - Chapter: chapters/11-forensic-anthropology/index.md
          - Quiz: chapters/11-forensic-anthropology/quiz.md
      - 12. Forensic Entomology:
          - Chapter: chapters/12-forensic-entomology/index.md
          - Quiz: chapters/12-forensic-entomology/quiz.md
      - 13. Firearms & Ballistics:
          - Chapter: chapters/13-firearms-and-ballistics/index.md
          - Quiz: chapters/13-firearms-and-ballistics/quiz.md
      - 14. Document Examination:
          - Chapter: chapters/14-document-examination/index.md
          - Quiz: chapters/14-document-examination/quiz.md
      - 15. Digital Forensics:
          - Chapter: chapters/15-digital-forensics/index.md
          - Quiz: chapters/15-digital-forensics/quiz.md
      - 16. Facial Recognition:
          - Chapter: chapters/16-facial-recognition/index.md
          - Quiz: chapters/16-facial-recognition/quiz.md
      - 17. Cell Phone Analytics:
          - Chapter: chapters/17-cell-phone-analytics/index.md
          - Quiz: chapters/17-cell-phone-analytics/quiz.md
      - 18. Social Media & OSINT:
          - Chapter: chapters/18-social-media-osint/index.md
          - Quiz: chapters/18-social-media-osint/quiz.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      - Concept Enumeration: learning-graph/concept-list.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Graph Quality Analysis: learning-graph/quality-metrics.md
      - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
      - Mascot Style Guide: learning-graph/mascot-test.md
      - FAQ Quality Report: learning-graph/faq-quality-report.md

  - MicroSims:
    - List of MicroSims: sims/index.md
    - Learning Graph Viewer: sims/graph-viewer/index.md
    - Interactive Timeline of Forensic Science History: sims/forensic-science-history-timeline/index.md
    - Locard Exchange Principle Visualizer: sims/locard-exchange-visualizer/index.md
    - Daubert vs. Frye Admissibility Decision Workflow: sims/daubert-frye-decision-workflow/index.md
    - Criminal Justice Process — From Crime Scene to Verdict: sims/criminal-justice-process-flow/index.md

  - FAQ: faq.md
  - Glossary: glossary.md

  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'deep purple'
    accent: 'amber'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  #     auto_caption: false
  #     caption_position: bottom
  #     skip_classes:
  #       - mascot-admonition-img   # keep mascot poses out of the lightbox gallery

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - css/mascot.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'Forensic Science'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
